name: Android CI

on: [push]

jobs:
  build:
    
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4.1.1
      
      - name: Set up NDK (r25b)
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25b
          add-to-path: false
          local-cache: true
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Install auxiliary build tools
        run: sudo apt-get install -y meson gperf
      
      - name: Download and build wesnoth dependencies
        run: cd packaging/android/build-android-dependencies; ./build-android-deps.sh;
          
      - name: Set up JDK 17
        uses: actions/setup-java@v4.0.0
        with:
          java-version: '17'
          distribution: 'temurin'
          #cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
            
            #- name: Grant execute permission for gradlew
            #  run: chmod +x gradlew
            #- name: Build with Gradle
            #  run: ./gradlew build
            